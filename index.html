<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroCam · Darkroom Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Ganti URL di bawah dengan gambar tekstur Anda nanti jika ada */
            --bg-wood: url(''); 
            --bg-leather: url(''); 
            --bg-paper: url(''); 
            
            --brass-1: #d4af37;
            --brass-2: #aa7c11;
            --brass-3: #5c430a;
            --leather-dark: #1f1a17;
            --leather-light: #2c2420;
        }

        body {
            background-color: #2b1d14;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%),
                repeating-linear-gradient(45deg, #382518 0px, #382518 2px, #2b1d14 2px, #2b1d14 4px);
            background-size: 100% 100%, 100px 100px;
            background-attachment: fixed;
            font-family: 'Courier Prime', monospace;
            color: #e5d3b3;
        }

        .machine-panel {
            background-color: var(--leather-dark);
            background-image: var(--bg-leather), linear-gradient(135deg, var(--leather-light) 0%, var(--leather-dark) 100%);
            border: 4px solid #110d0a;
            border-radius: 16px;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.8),
                inset 0 2px 2px rgba(255,255,255,0.1),
                10px 15px 25px rgba(0,0,0,0.7);
            position: relative;
        }

        .rivet {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, var(--brass-1) 0%, var(--brass-2) 60%, var(--brass-3) 100%);
            border-radius: 50%;
            position: absolute;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.8), inset -1px -1px 2px rgba(0,0,0,0.5), inset 1px 1px 2px rgba(255,255,255,0.4);
        }
        .rivet-tl { top: 12px; left: 12px; }
        .rivet-tr { top: 12px; right: 12px; }
        .rivet-bl { bottom: 12px; left: 12px; }
        .rivet-br { bottom: 12px; right: 12px; }

        .brass-plate {
            background: linear-gradient(to bottom, #e6c27a 0%, #c59b43 50%, #a67c27 51%, #d4af37 100%);
            border: 2px solid #5c430a;
            border-radius: 6px;
            color: #3e2a05;
            font-family: 'Special Elite', cursive;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            box-shadow: 2px 3px 5px rgba(0,0,0,0.6), inset 1px 1px 1px rgba(255,255,255,0.6);
            padding: 6px 16px;
            display: inline-block;
        }

        .mechanical-input {
            background-color: #0a0807;
            border: 2px solid #3a2a1f;
            border-top-color: #1a130e;
            border-left-color: #1a130e;
            border-radius: 8px;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.9);
            transition: all 0.2s;
        }
        .mechanical-input:focus {
            outline: none;
            border-color: var(--brass-2);
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.9), 0 0 5px rgba(212, 175, 55, 0.4);
        }

        .clipboard-paper {
            background-color: #f4e8d1;
            background-image: var(--bg-paper);
            color: #2b1d14;
            font-family: 'Special Elite', cursive;
            border-radius: 2px;
            box-shadow: 
                2px 4px 10px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(200, 160, 120, 0.3);
            position: relative;
        }
        .clipboard-paper textarea {
            background: transparent;
            color: #2b1d14;
            font-family: 'Special Elite', cursive;
            line-height: 1.6;
        }
        .clipboard-paper textarea::placeholder {
            color: #a89478;
        }
        .clipboard-clip {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: linear-gradient(to bottom, #d1d5db 0%, #9ca3af 50%, #6b7280 100%);
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
            border: 1px solid #4b5563;
        }

        .brass-button {
            background: radial-gradient(circle at 50% 20%, #f9d976 0%, #e6b940 30%, #b3851b 80%, #6e5008 100%);
            border: 4px solid #3e2a05;
            border-radius: 50%;
            color: #2b1d14;
            font-family: 'Special Elite', cursive;
            font-weight: bold;
            box-shadow: 
                0 10px 15px rgba(0,0,0,0.7),
                inset 0 5px 10px rgba(255,255,255,0.4),
                inset 0 -5px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
            position: relative;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .brass-button:active {
            transform: translateY(4px) scale(0.98);
            box-shadow: 
                0 2px 5px rgba(0,0,0,0.8),
                inset 0 2px 10px rgba(255,255,255,0.2),
                inset 0 -2px 10px rgba(0,0,0,0.6);
        }

        .polaroid-frame {
            background-color: #f9f8f4;
            padding: 16px 16px 60px 16px;
            box-shadow: 
                5px 10px 20px rgba(0,0,0,0.6),
                inset 0 0 10px rgba(0,0,0,0.05);
            transform: rotate(2deg);
            transition: transform 0.3s;
        }
        .polaroid-frame:hover {
            transform: rotate(0deg) scale(1.02);
        }
        .polaroid-screen {
            background-color: #0d0b0a;
            border: 2px solid #222;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }
        .polaroid-screen::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        .crt-text {
            font-family: 'VT323', monospace;
            color: #ffb000;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(255, 176, 0, 0.5);
            line-height: 1.2;
        }

        .handwriting {
            font-family: 'Special Elite', cursive;
            color: #1a1a1a;
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-size: 1rem;
            opacity: 0.8;
            transform: rotate(-1deg);
        }

        .retro-toggle input:checked + div {
            background-color: var(--brass-2);
        }
        .retro-toggle input:checked + div > div {
            transform: translateX(100%);
            background: linear-gradient(to bottom, #fff, #d1d5db);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0807; }
        ::-webkit-scrollbar-thumb { background: #5c430a; border-radius: 4px; }
        
        textarea:disabled { opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <header class="max-w-6xl w-full mb-8 flex justify-between items-end border-b-2 border-[#5c430a] pb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#d4af37] rounded-sm flex items-center justify-center shadow-lg border border-[#3e2a05]">
                <i class="fas fa-camera-retro text-[#2b1d14] text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-widest text-[#d4af37]" style="font-family: 'Special Elite', cursive;">RETROCAM DARKROOM</h1>
        </div>
        <div class="hidden md:flex gap-6 text-sm text-[#a89478] uppercase tracking-wider font-bold">
            <a href="#" class="hover:text-[#d4af37] transition-colors text-[#d4af37]">UI/UX Web Dashboard</a>
            <a href="#" class="hover:text-[#d4af37] transition-colors">Prompt</a>
            <a href="#" class="hover:text-[#d4af37] transition-colors">About</a>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
        
        <!-- PANEL KIRI (Mesin Konfigurasi) -->
        <div class="lg:col-span-6 machine-panel p-6 md:p-8">
            <div class="rivet rivet-tl"></div><div class="rivet rivet-tr"></div>
            <div class="rivet rivet-bl"></div><div class="rivet rivet-br"></div>

            <div class="flex justify-center mb-8">
                <div class="brass-plate text-xl tracking-wider">Konfigurasi</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                
                <!-- Kolom Saklar & Dial -->
                <div class="space-y-6">
                    
                    <!-- Toggle Mode Gambar -->
                    <div class="bg-[#1a130e] p-3 rounded-lg border border-[#3a2a1f] shadow-inner">
                        <label class="retro-toggle flex items-center cursor-pointer justify-between" title="Gunakan Gambar Unggahan (Nano Banana / Flow)">
                            <span class="text-xs text-[#d4af37] uppercase font-bold tracking-wider mr-2">Mode Gambar</span>
                            <div class="relative">
                                <input type="checkbox" id="useImageOnly" class="sr-only" onchange="toggleDescriptionField()">
                                <div class="block bg-black w-10 h-6 rounded-full shadow-inner border border-[#3a2a1f]"></div>
                                <div class="dot absolute left-1 top-1 bg-gradient-to-b from-gray-400 to-gray-600 w-4 h-4 rounded-full transition transform shadow-md"></div>
                            </div>
                        </label>
                    </div>

                    <!-- Input Selectors (Dials) -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-[#a89478] uppercase mb-1 font-bold">Kategori</label>
                            <select id="category" class="w-full px-3 py-2 mechanical-input text-sm" onchange="updateStyles()">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-[#a89478] uppercase mb-1 font-bold">Gaya Spesifik</label>
                            <select id="style" class="w-full px-3 py-2 mechanical-input text-sm">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-[#a89478] uppercase mb-1 font-bold">Pencahayaan</label>
                            <select id="lighting" class="w-full px-3 py-2 mechanical-input text-sm">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                    </div>

                    <!-- Tombol Generate Bulat -->
                    <div class="flex justify-center pt-4">
                        <button onclick="generatePrompt()" class="brass-button w-32 h-32 flex-col gap-1 hover:brightness-110">
                            <span class="text-sm uppercase tracking-wider block">Hasilkan</span>
                            <span class="text-lg font-bold block">Prompt</span>
                        </button>
                    </div>

                </div>

                <!-- Kolom Clipboard & Ekstra -->
                <div class="space-y-6">
                    
                    <!-- Kertas Catatan -->
                    <div class="clipboard-paper p-4 pt-6 h-48 flex flex-col mt-2">
                        <div class="clipboard-clip"></div>
                        <label class="block text-sm font-bold mb-2 border-b border-[#d1c0a5] pb-1">Deskripsi Subjek</label>
                        <textarea id="subject" class="w-full h-full resize-none focus:outline-none" placeholder="Tulis apa yang ingin Anda potret... (Bahasa Inggris)"></textarea>
                    </div>

                    <!-- Tipe & Ekspresi -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-[#a89478] uppercase mb-1 font-bold">Tipe Subjek</label>
                            <select id="entityType" class="w-full px-3 py-2 mechanical-input text-sm">
                                <option value="Person">Person (Orang)</option>
                                <option value="Object">Object (Benda)</option>
                                <option value="Animal">Animal (Hewan)</option>
                                <option value="Landscape">Landscape (Pemandangan)</option>
                                <option value="Architecture">Architecture (Bangunan)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-[#a89478] uppercase mb-1 font-bold">Ekspresi / Mood</label>
                            <select id="expression" class="w-full px-3 py-2 mechanical-input text-sm">
                                <option value="Natural neutral expression">Natural / Netral</option>
                                <option value="Smiling softly">Tersenyum lembut</option>
                                <option value="Serious / Intense">Serius / Intens</option>
                                <option value="Candid / Laughing">Candid / Tertawa</option>
                                <option value="Pensive">Melamun / Kontemplatif</option>
                                <option value="Joyful">Gembira</option>
                                <option value="Mysterious">Misterius</option>
                            </select>
                        </div>
                    </div>

                    <!-- AR / Midjourney -->
                    <div class="bg-[#1a130e] p-3 rounded-lg border border-[#3a2a1f] shadow-inner mt-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-[#d4af37] uppercase font-bold tracking-wider">Format Midjourney (--ar)</span>
                            <label class="retro-toggle flex items-center cursor-pointer">
                                <input type="checkbox" id="mjMode" class="sr-only" checked onchange="toggleAr()">
                                <div class="block bg-black w-8 h-4 rounded-full shadow-inner border border-[#3a2a1f]"></div>
                                <div class="dot absolute left-0.5 top-0.5 bg-gray-400 w-3 h-3 rounded-full transition transform shadow-md"></div>
                            </label>
                        </div>
                        <div id="arContainer">
                            <select id="aspectRatio" class="w-full px-2 py-1 mechanical-input text-sm">
                                <option value="--ar 3:2">3:2 (35mm / Landscape)</option>
                                <option value="--ar 4:3">4:3 (Digital Old / CRT)</option>
                                <option value="--ar 1:1">1:1 (Square / Polaroid)</option>
                                <option value="--ar 16:9">16:9 (Cinematic)</option>
                                <option value="--ar 9:16">9:16 (Portrait / HP)</option>
                            </select>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- PANEL KANAN (Meja & Polaroid) -->
        <div class="lg:col-span-6 flex flex-col items-center justify-center relative min-h-[500px]">
            
            <div class="brass-plate text-xl tracking-wider mb-8 absolute top-0">Hasil Prompt</div>

            <!-- Polaroid Frame -->
            <div class="polaroid-frame w-full max-w-md relative z-10 mt-12">
                <!-- Inner Screen for CRT text -->
                <div class="polaroid-screen w-full h-96 p-4 rounded-sm flex flex-col">
                    <p class="text-[#ffb000] text-sm opacity-50 mb-2 font-mono">USER_PROMPT_READY></p>
                    <textarea id="result" class="w-full h-full bg-transparent resize-none focus:outline-none crt-text relative z-20" readonly placeholder="Prompt terstruktur akan muncul..."></textarea>
                </div>
                <!-- Handwriting text -->
                <div class="handwriting flex justify-between w-[90%]">
                    <span>Prompt #<span id="randNum">453</span></span>
                    <span id="labelTipe">Kategori</span>
                </div>
            </div>

            <!-- Copy Button Area (Bawah Polaroid) -->
            <div class="mt-8 flex gap-4 relative z-20">
                <button onclick="copyPrompt()" class="bg-[#d4af37] hover:bg-[#e6c27a] text-[#2b1d14] font-bold py-3 px-8 border-b-4 border-[#a67c27] hover:border-[#d4af37] hover:translate-y-[2px] transition-all rounded shadow-lg uppercase tracking-wider text-sm flex items-center">
                    <i class="fas fa-copy mr-2"></i> Salin ke Clipboard
                </button>
            </div>

        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#1a130e] border-2 border-[#d4af37] text-[#e5d3b3] px-6 py-4 rounded shadow-2xl transition-all duration-300 transform translate-y-20 opacity-0 flex items-center z-50 font-mono">
        <i id="toast-icon" class="fas fa-check-square mr-3 text-[#d4af37]"></i>
        <span id="toast-message" class="font-bold tracking-wide">SYSTEM: OK</span>
    </div>

    <script>
        // ========== MENGGUNAKAN DATABASE FULL DARI VERSI ASLI ==========
        const cameraDatabase = {
            analog: {
                name: "🎞️ Analog 35mm",
                styles: [
                    { id: "disposable", name: "Disposable 90s", prompt: "authentic 90s disposable camera aesthetic, amateur photography, high film grain, warm 35mm film stock, slightly out of focus, slight lens flare, vintage color saturation, light leaks, nostalgic 1990s vibe, glowing date stamp" },
                    { id: "kodak_portra", name: "Kodak Portra 400", prompt: "shot on Kodak Portra 400, 35mm lens, fine film grain, realistic skin tones, cinematic lighting, analog photography, soft pastel colors, sharp focus, shallow depth of field" },
                    { id: "fujifilm_superia", name: "Fujifilm Superia 400", prompt: "shot on Fujifilm Superia 400, analog photography, characteristic green/magenta tint, moody, contrasty, visible film grain, 35mm street photography" },
                    { id: "cinestill_800t", name: "CineStill 800T", prompt: "shot on CineStill 800T film, cinematic night photography, red halation, glowing neon, cool shadows, film grain, tungsten white balance" },
                    { id: "kodachrome", name: "Kodachrome 64", prompt: "shot on Kodachrome 64 film, vibrant colors, rich saturation, fine grain, classic 60s-70s magazine aesthetic" }
                ]
            },
            lomography: {
                name: "🌈 Lomography",
                styles: [
                    { id: "lomo_lc_a", name: "Lomo LC-A", prompt: "Lomography LC-A aesthetic, highly saturated, strong vignetting, light leaks, lo-fi analog charm" },
                    { id: "redscale", name: "Redscale Film", prompt: "redscale film photography, intense red-orange cast, surreal, chemical color shifts" },
                    { id: "expired_film", name: "Expired Film", prompt: "expired 35mm film aesthetic, color shifts, increased grain, muddy shadows, light leaks" },
                    { id: "film_soup", name: "Film Soup", prompt: "film soup photography, damaged film, warped colors, chemical stains, extreme grain" }
                ]
            },
            instant: {
                name: "📸 Instan",
                styles: [
                    { id: "polaroid_sx70", name: "Polaroid SX-70", prompt: "shot on Polaroid SX-70, instant film, rich colors, high contrast, glossy, white frame" },
                    { id: "faded_polaroid", name: "Polaroid Pudar", prompt: "faded polaroid aesthetic, soft blur, retro color shift, warm tones, vignette" },
                    { id: "fuji_instax", name: "Fujifilm Instax", prompt: "shot on Fujifilm Instax Mini, overexposed, pastel wash, bright flash, cute retro" },
                    { id: "expired_polaroid", name: "Polaroid Kadaluarsa", prompt: "expired Polaroid film, yellow/brown shifts, uneven chemicals, low contrast, dreamy fog" }
                ]
            },
            digicam: {
                name: "💾 Digicam Y2K",
                styles: [
                    { id: "y2k_digicam", name: "Sony Cyber-shot", prompt: "early 2000s digital camera, CCD bloom, low megapixel, blown highlights, chromatic aberration, Y2K flash" },
                    { id: "webcam_2000s", name: "Webcam 2000s", prompt: "2000s PC webcam, 480p, heavy pixelation, low frame rate, digital noise, early internet vibe" }
                ]
            },
            phone: {
                name: "📱 HP Jadul",
                styles: [
                    { id: "nokia_vga", name: "Nokia VGA", prompt: "2005 flip phone camera, VGA resolution, heavy jpeg compression, pixelated, low quality, 144p" },
                    { id: "early_iphone", name: "iPhone Awal", prompt: "shot on early iPhone 3G, 2MP, washed colors, digital grain, 2010s retro" }
                ]
            },
            blackwhite: {
                name: "🎞️ B/W Klasik",
                styles: [
                    { id: "leica_ilford", name: "Ilford HP5", prompt: "shot on Leica M3, Ilford HP5, high contrast, heavy silver grain, dramatic monochrome" },
                    { id: "kodak_tmax", name: "Kodak T-Max 400", prompt: "Kodak T-Max 400, fine grain, sharp details, wide tonal range" },
                    { id: "wet_plate", name: "Wet Plate 1850s", prompt: "wet plate collodion, tintype, antique sepia, scratches, dust, haunting" },
                    { id: "cyanotype", name: "Cyanotype", prompt: "cyanotype process, Prussian blue monochrome, brushed paper texture, scientific aesthetic" }
                ]
            },
            cctv_video: {
                name: "📹 CCTV/VHS",
                styles: [
                    { id: "vhs_camcorder", name: "VHS Camcorder", prompt: "1990s VHS still, tracking lines, RGB bleeding, scanlines, timestamp overlay" },
                    { id: "cctv_camera", name: "CCTV Security", prompt: "CCTV footage, low res, fish eye, grainy night vision, timestamp, surveillance" }
                ]
            },
            toy_camera: {
                name: "🧸 Kamera Mainan",
                styles: [
                    { id: "holga_120", name: "Holga 120", prompt: "Holga 120, medium format, heavy vignette, soft focus, light leaks, plastic lens" },
                    { id: "diana_f", name: "Diana F+", prompt: "Diana F+, dreamy soft focus, surreal leaks, strong vignette, retro snapshot" },
                    { id: "pinhole", name: "Pinhole", prompt: "pinhole photography, extreme wide, infinite DOF, soft, long exposure blur" }
                ]
            },
            lens_effect: {
                name: "🔮 Efek Lensa",
                styles: [
                    { id: "helios_44_2", name: "Helios 44-2", prompt: "Helios 44-2 vintage lens, swirly bokeh, creamy background, Soviet character" },
                    { id: "petzval", name: "Petzval Lens", prompt: "Petzval portrait lens, sharp center, dramatic fall-off, swirling bokeh, 19th century" }
                ]
            }
        };

        const lightingDatabase = [
            { id: "default", name: "Default", prompt: "" },
            { id: "harsh_flash", name: "Harsh Flash", prompt: "harsh direct flash, overexposed subject, black background, stark contrast" },
            { id: "natural", name: "Natural Light", prompt: "natural sunlight, soft ambient lighting" },
            { id: "golden_hour", name: "Golden Hour", prompt: "golden hour lighting, warm rays, long shadows" },
            { id: "night_neon", name: "Night Neon", prompt: "night time, neon signs, moody lighting, cinematic flares" },
            { id: "studio_portrait", name: "Studio Portrait", prompt: "studio lighting, softbox, perfectly exposed" }
        ];

        function getLensHint(styleId) {
            if (styleId.includes('disposable')) return 'Plastic fixed 30mm f/10';
            if (styleId.includes('portra')||styleId.includes('cinestill')) return 'Prime 50mm f/1.4';
            if (styleId.includes('polaroid')) return 'Polaroid 116mm f/8';
            if (styleId.includes('vga')) return 'Fixed focus VGA';
            if (styleId.includes('helios')) return 'Helios 58mm f/2';
            if (styleId.includes('holga')) return 'Holga plastic 60mm f/8';
            return 'Vintage lens';
        }

        // Toggle deskripsi enable/disable (Sama persis dengan aslinya)
        function toggleDescriptionField() {
            const useImage = document.getElementById('useImageOnly').checked;
            const subjectArea = document.getElementById('subject');
            
            subjectArea.disabled = useImage;
            if (useImage) {
                subjectArea.value = '';
                subjectArea.placeholder = '[MODE GAMBAR] Deskripsi dinonaktifkan.';
            } else {
                subjectArea.placeholder = 'Contoh: A young woman sitting in a retro diner...';
            }
        }

        window.onload = function() {
            const catSelect = document.getElementById('category');
            const lightSelect = document.getElementById('lighting');
            for (let key in cameraDatabase) {
                let opt = document.createElement('option');
                opt.value = key;
                opt.text = cameraDatabase[key].name;
                catSelect.appendChild(opt);
            }
            lightingDatabase.forEach(l => {
                let opt = document.createElement('option');
                opt.value = l.id;
                opt.text = l.name;
                lightSelect.appendChild(opt);
            });
            updateStyles();
            toggleAr();
            toggleDescriptionField();
            document.getElementById('randNum').innerText = Math.floor(Math.random() * 900) + 100;
        };

        function updateStyles() {
            const cat = document.getElementById('category').value;
            const styleSelect = document.getElementById('style');
            styleSelect.innerHTML = '';
            cameraDatabase[cat].styles.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.id;
                opt.text = s.name;
                styleSelect.appendChild(opt);
            });
        }

        function toggleAr() {
            const ar = document.getElementById('arContainer');
            const checked = document.getElementById('mjMode').checked;
            ar.style.display = checked ? 'block' : 'none';
        }

        // ========== LOGIKA GENERATE PROMPT ASLI ==========
        function generatePrompt() {
            const useImage = document.getElementById('useImageOnly').checked;
            const subject = document.getElementById('subject').value.trim();
            
            if (!useImage && !subject) {
                showToast('SYS_ERR: Deskripsi subjek wajib diisi!', 'error');
                document.getElementById('subject').focus();
                return;
            }

            const entityType = document.getElementById('entityType').value;
            const expression = document.getElementById('expression').value;
            const catId = document.getElementById('category').value;
            const styleId = document.getElementById('style').value;
            const lightId = document.getElementById('lighting').value;
            const mjMode = document.getElementById('mjMode').checked;
            const ar = document.getElementById('aspectRatio').value;
            
            const catObj = cameraDatabase[catId];
            const styleObj = catObj.styles.find(s=>s.id===styleId);
            const lightObj = lightingDatabase.find(l=>l.id===lightId);
            
            let structured = `[INSTRUKSI SISTEM]\n> MODE KONSISTENSI ESTETIKA: Terapkan efek kamera/film retro yang dipilih. Pertahankan ketidaksempurnaan analog.\n\n`;
            
            if (!useImage) {
                structured += `[DETAIL SUBJEK]\n- Tipe: ${entityType}\n- Deskripsi: ${subject}\n- Ekspresi/Mood: ${expression}\n- Batasan: TEPAT SATU subjek utama.\n\n`;
            } else {
                structured += `[MODE GAMBAR]\n- Menggunakan gambar unggahan (Nano Banana). Tidak ada deskripsi teks subjek.\n\n`;
            }
            
            structured += `[GAYA KAMERA]\n- Kategori: ${catObj.name}\n- Gaya: ${styleObj.name}\n- Keywords: ${styleObj.prompt}\n- Pencahayaan: ${lightObj.prompt || 'Default'}\n\n`;
            structured += `[FOTOGRAFI]\n- Lensa: ${getLensHint(styleId)}\n- Rasio: ${mjMode ? ar.replace('--ar ','') : 'Default'}\n- Komposisi: Vintage autentik (grain, leaks, tilt)\n\n`;
            structured += `[PROMPT FINAL]\n`;
            
            let finalParts = [];
            if (!useImage) finalParts.push(subject);
            finalParts.push(styleObj.prompt);
            if (lightObj.prompt) finalParts.push(lightObj.prompt);
            
            if (catId === 'phone'||catId==='cctv_video'||catId==='digicam') finalParts.push('raw unedited, low quality, authentic');
            else finalParts.push('photorealistic, ultra detailed, analog masterpiece');
            
            let final = finalParts.join(', ').replace(/,\s*,/g,',');
            if(mjMode) final += ` ${ar} --v 6.0`;
            structured += final;
            
            const resultBox = document.getElementById('result');
            resultBox.value = structured;
            
            // Update Label Polaroid
            document.getElementById('labelTipe').innerText = catObj.name.replace(/[^a-zA-Z0-9\s]/g, '').trim();
            document.getElementById('randNum').innerText = Math.floor(Math.random() * 900) + 100;

            showToast('SYS_MSG: Prompt Terstruktur Siap', 'success');
        }

        function copyPrompt() {
            const txt = document.getElementById('result').value;
            if(!txt) { showToast('SYS_ERR: Prompt kosong', 'error'); return; }
            navigator.clipboard.writeText(txt).then(()=>showToast('SYS_MSG: Tersalin ke Clipboard', 'success'))
            .catch(()=>{ 
                const ta=document.getElementById('result'); 
                ta.select(); 
                document.execCommand('copy'); 
                showToast('SYS_MSG: Copied (fallback)'); 
            });
        }

        function showToast(msg, type='info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-message');
            msgEl.innerText = msg;
            
            toast.classList.remove('translate-y-20','opacity-0', 'border-red-500', 'text-red-400');
            if(type==='error') { 
                toast.classList.add('border-red-500', 'text-red-400'); 
                icon.className='fas fa-exclamation-triangle mr-3 text-red-500'; 
            } else { 
                icon.className='fas fa-check-square mr-3 text-[#d4af37]'; 
            }
            
            toast.classList.remove('translate-y-20','opacity-0');
            setTimeout(()=>toast.classList.add('translate-y-20','opacity-0'),3000);
        }
    </script>
</body>
</html>
